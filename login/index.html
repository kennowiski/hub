<!DOCTYPE html>
<html lang="pt-br">
<head>
    <base href="/">
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Login privado</title>
    <link href="assets/images/favicon.webp" rel="icon" type="image/webp" />
    <link rel="stylesheet" href="style.css">
</head>

<body style="background-color: #0f1117;">
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>

    <div class="story-login-overlay active" id="story-login-modal" aria-hidden="false">
        <div class="story-login-card" role="dialog" aria-modal="true" aria-labelledby="story-login-title">
            <button class="story-login-close" id="story-login-close" type="button" aria-label="Voltar para a home">
                <svg aria-hidden="true" class="icon" viewBox="0 0 384 512">
                    <path d="M342.6 150.6c12.5-12.5 12.5-32.8 0-45.3s-32.8-12.5-45.3 0L192 210.7 86.6 105.4c-12.5-12.5-32.8-12.5-45.3 0s-12.5 32.8 0 45.3L146.7 256 41.4 361.4c-12.5 12.5-12.5 32.8 0 45.3s32.8 12.5 45.3 0L192 301.3 297.4 406.6c12.5 12.5 32.8 12.5 45.3 0s12.5-32.8 0-45.3L237.3 256 342.6 150.6z"></path>
                </svg>
            </button>

            <div class="story-login-badge">Acesso privado</div>

            <h3 id="story-login-title">Acesso privado</h3>
            <p class="story-login-desc">Área restrita.</p>

            <form class="story-login-form" id="story-login-form">
                <label for="story-login-email">E-mail</label>
                <input id="story-login-email" type="email" autocomplete="email" placeholder="seu@email.com" required>

                <label for="story-login-password">Senha</label>
                <input id="story-login-password" type="password" autocomplete="current-password" placeholder="••••••••" required>

                <p class="story-login-message" id="story-login-message" aria-live="polite"></p>

                <button class="story-login-submit" id="story-login-submit" type="submit">Entrar</button>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_PROJECT_URL = 'https://ivbpcyjkvzsawjzhrwsd.supabase.co';
        const SUPABASE_PUBLISHABLE_KEY = 'sb_publishable_YLo65P0_gWwgWTMhRzr7Cw_gnd03sdu';
        const SUPABASE_AUTH_STORAGE_KEY = 'sb-ivbpcyjkvzsawjzhrwsd-auth-token';
        const ADMIN_VERIFY_ENDPOINT = 'https://kennowiski-api-hub.vercel.app/api/admin/verify';

        const client = window.supabase.createClient(SUPABASE_PROJECT_URL, SUPABASE_PUBLISHABLE_KEY, {
            auth: {
                persistSession: true,
                autoRefreshToken: true,
                detectSessionInUrl: false,
                storageKey: SUPABASE_AUTH_STORAGE_KEY
            }
        });

        const form = document.getElementById('story-login-form');
        const emailInput = document.getElementById('story-login-email');
        const passwordInput = document.getElementById('story-login-password');
        const submitBtn = document.getElementById('story-login-submit');
        const messageEl = document.getElementById('story-login-message');
        const closeBtn = document.getElementById('story-login-close');

        function setMessage(message, type = '') {
            messageEl.textContent = message;
            messageEl.classList.remove('error', 'success');

            if (type) {
                messageEl.classList.add(type);
            }
        }

        async function verifySession(session) {
            const accessToken = session && session.access_token;

            if (!accessToken) return false;

            const response = await fetch(ADMIN_VERIFY_ENDPOINT, {
                method: 'GET',
                cache: 'no-store',
                headers: {
                    authorization: 'Bearer ' + accessToken
                }
            });

            if (!response.ok) return false;

            const data = await response.json().catch(() => ({
                allowed: false
            }));

            return data && data.allowed === true;
        }

        closeBtn.addEventListener('click', () => {
            window.location.href = '/';
        });

        form.addEventListener('submit', async (event) => {
            event.preventDefault();

            const email = emailInput.value.trim();
            const password = passwordInput.value;

            if (!email || !password) {
                setMessage('Preencha e-mail e senha.', 'error');
                return;
            }

            submitBtn.disabled = true;
            setMessage('Entrando...');

            try {
                const { data, error } = await client.auth.signInWithPassword({
                    email,
                    password
                });

                if (error || !data || !data.session) {
                    setMessage('Login inválido.', 'error');
                    passwordInput.value = '';
                    passwordInput.focus();
                    return;
                }

                const allowed = await verifySession(data.session);

                if (!allowed) {
                    await client.auth.signOut();
                    setMessage('Usuário não autorizado.', 'error');
                    return;
                }

                setMessage('Acesso liberado.', 'success');

                setTimeout(() => {
                    window.location.href = '/admin';
                }, 350);
            } catch (error) {
                console.error('Erro no login privado:', error);
                setMessage('Erro ao entrar. Tente novamente.', 'error');
            } finally {
                submitBtn.disabled = false;
            }
        });

        client.auth.getSession().then(async ({ data }) => {
            const session = data && data.session;

            if (session && await verifySession(session)) {
                window.location.href = '/admin';
            }
        });
    </script>
</body>
</html>
